name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gossh_linux_amd64 ./cmd/gossh

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gossh_windows_amd64.exe ./cmd/gossh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.md
          files: |
            dist/gossh_linux_amd64
            dist/gossh_windows_amd64.exe
