<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E😂%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E😂%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E😂%3C/text%3E%3C/svg%3E" sizes="180x180">
    <meta name="theme-color" content="#212129">
    <title>MiniChat</title>
    <meta name="description" content="Minichat">
    <link href="static/bulma.min.css" rel="stylesheet">

    <style type="text/css">

        #app {
            margin: 0 auto;
            max-width: 768px;
            max-height: 100vh;
            overflow: hidden;
        }

        html,body,main {
            height: 100%;
        }

        .transition {
            transition-property: color, background-color, border-color, outline-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(.4,0,.2,1);
            transition-duration: .15s;
        }

        #themeToggle:where(.astro-KXYEDVG6) {
            border: 0;
            cursor: pointer
        }

        .theme_toggle_circle1:where(.astro-KXYEDVG6) {
            transition: cx .5s,cy .5s;
            cx: 100%;
            cy: 0%
        }

        .theme_toggle_circle2:where(.astro-KXYEDVG6) {
            transition: r .3s
        }

        .theme_toggle_svg:where(.astro-KXYEDVG6) {
            transition: transform .5s cubic-bezier(.68,-.55,.27,1.55);
            transform: rotate(90deg)
        }

        .theme_toggle_g:where(.astro-KXYEDVG6) {
            transition: opacity .5s;
            opacity: 1
        }

        .theme-dark .theme_toggle_circle1:where(.astro-KXYEDVG6) {
            cx: 50%;
            cy: 23%
        }

        .theme-dark .theme_toggle_svg:where(.astro-KXYEDVG6) {
            transform: rotate(40deg)
        }

        .theme-dark .theme_toggle_g:where(.astro-KXYEDVG6) {
            opacity: 0
        }

        .msg-item {
            border-radius: 20px;
            padding: 8px 15px;
            margin-top: 5px;
            margin-bottom: 5px;
            display: inline-block;
            word-break: break-word;
            max-width: 80%;
            position: relative;
            --msg-h: var(--bulma-scheme-h);
            --msg-s: var(--bulma-scheme-s);
            --msg-background-l: var(--bulma-background-l);
            --msg-color-l: var(--bulma-text-strong-l);
            --msg-background-color: var(--bulma-scheme-main);
            background-color: hsl(var(--msg-h), var(--msg-s), var(--msg-background-l));
            color: hsl(var(--msg-h),var(--msg-s),var(--msg-color-l));
        }

        .msg-item.last:before,
        .msg-item.last:after {
            content: "";
            position: absolute;
            bottom: 0;
            height: 20px;
        }

        .msg-item.last:before {
            z-index: 0;
            width: 20px;
            background-color: hsl(var(--msg-h), var(--msg-s), var(--msg-background-l));
        }

        .msg-item.last:after {
            z-index: 1;
            width: 10px;
            background-color: white;
        }

        .theme-dark .msg-item.last:after {
            background-color: var(--bulma-scheme-main);
        }

        .received {
            align-items: flex-start;
        }

        .received .msg-item {
            margin-left: 8px;
        }

        .received .msg-item.last:before {
            left: -7px;
            border-bottom-right-radius: 15px;
        }
        .received .msg-item.last:after {
            left: -10px;
            border-bottom-right-radius: 10px;
        }

        .sended {
            align-items: flex-end;
        }

        .sended .msg-item {
            --msg-h: var(--bulma-link-h);
            --msg-s: var(--bulma-link-s);
            --msg-background-l: var(--bulma-link-l);
            --msg-color-l: var(--bulma-link-invert-l);
            margin-right: 8px;
        }

        .sended .msg-item.last:before {
            right: -8px;
            border-bottom-left-radius: 15px;
        }

        .sended .msg-item.last:after {
            right: -10px;
            border-bottom-left-radius: 10px;
        }

        .system .msg-item {
            --msg-h: var(--bulma-info-h);
            --msg-s: var(--bulma-info-s);
            --msg-background-l: var(--bulma-info-l);
            --msg-color-l: var(--bulma-info-invert-l);
        }

        .app-title {
            --un-gradient-from-position: 0%;
            --un-gradient-from: var(--bulma-primary) var(--un-gradient-from-position);
            --un-gradient-to: rgba(56,189,248,0) var(--un-gradient-to-position);
            --un-gradient-stops: var(--un-gradient-from), var(--un-gradient-to);
            --un-gradient-to-position: 100%;
            --un-gradient-to: var(--bulma-link) var(--un-gradient-to-position);
            --un-gradient-shape: to right;
            --un-gradient: var(--un-gradient-shape), var(--un-gradient-stops);
            background-image: linear-gradient(var(--un-gradient));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .h-full {
            height: 100%;
        }

        .w-full {
            width: 100%;
        }

        .message-text {
            margin: 0;
            white-space: pre-wrap;
        }

        .message-image {
            display: block;
            max-width: min(100%, 360px);
            border-radius: 12px;
            cursor: zoom-in;
        }

        .message-tools {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .message-tools.is-received {
            justify-content: flex-start;
        }

        .is-hidden-input {
            display: none;
        }

        .image-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(6px);
        }

        .image-modal img {
            max-width: min(92vw, 1200px);
            max-height: 88vh;
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        .image-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
        }
    </style>
    <script src="static/vue.global.js"></script>
</head>

<body>
    <main id="app" class="hero is-fullheight is-flex is-flex-direction-column">
        <div class="hero-head">
            <nav class="navbar is-flex px-5 pt-5">
                <div class="navbar-brand">
                    <div class="navbar-item">
                        <h1 class="title app-title">MiniChat</h1>
                    </div>
                </div>
                <div class="navbar-end">
                    <div class="navbar-item">
                        <div id="themeToggle" class="button is-ghost transition">
                            <svg class="theme_toggle_svg astro-KXYEDVG6" width="1.2em" height="1.2em" viewBox="0 0 24 24" color="#858585" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor">
                                <mask id="myMask" class="astro-KXYEDVG6">
                                    <rect x="0" y="0" width="100%" height="100%" fill="white" class="astro-KXYEDVG6"></rect>
                                    <circle class="theme_toggle_circle1 astro-KXYEDVG6" fill="black" cx="100%" cy="0%" r="5"></circle>
                                </mask>
                                <circle class="theme_toggle_circle2 astro-KXYEDVG6" cx="12" cy="12" fill="#858585" mask="url(#myMask)" r="5"></circle>
                                <g class="theme_toggle_g astro-KXYEDVG6" stroke="currentColor" opacity="1">
                                    <line x1="12" y1="1" x2="12" y2="3" class="astro-KXYEDVG6"></line>
                                    <line x1="12" y1="21" x2="12" y2="23" class="astro-KXYEDVG6"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" class="astro-KXYEDVG6"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" class="astro-KXYEDVG6"></line>
                                    <line x1="1" y1="12" x2="3" y2="12" class="astro-KXYEDVG6"></line>
                                    <line x1="21" y1="12" x2="23" y2="12" class="astro-KXYEDVG6"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" class="astro-KXYEDVG6"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" class="astro-KXYEDVG6"></line>
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>
            </nav>
        </div>

        <div class="hero-body is-flex-shrink-1 py-3 my-2" style="overflow: hidden auto" id="message-wrapper">
            <div class="is-flex is-flex-direction-column h-full w-full">
                <div id="messages" class="is-flex-grow-1">
                    <div
                        class="message"
                        v-for="msg in items"
                        :key="msg.renderKey"
                        :class="{ 'has-text-right': !(msg.cmd === 'join' || msg.cmd === 'exit') && msg.username === username }"
                    >
                        <div class="is-size-6 has-text-grey has-text-weight-medium">
                            <template v-if="msg.cmd === 'join' || msg.cmd === 'exit'">
                                ( SYSTEM )
                            </template>
                            <template v-else-if="msg.username !== username">
                                {[ msg.username ]}
                            </template>
                            <template v-else>
                                ( ME ) {[ msg.username ]}
                            </template>
                        </div>
                        <div class="is-size-7 has-text-grey-light">
                            {[ formatDate(msg.sentAt) ]}
                        </div>

                        <div :class="{
                            received: msg.cmd === 'join' || msg.cmd === 'exit' || msg.username !== username,
                            sended: !(msg.cmd === 'join' || msg.cmd === 'exit') && msg.username === username,
                            system: msg.cmd === 'join' || msg.cmd === 'exit'
                        }">
                            <div class="msg-item last">
                                <template v-if="msg.cmd === 'join' || msg.cmd === 'exit'">
                                    <p class="message-text" v-html="msg.payload"></p>
                                </template>
                                <template v-else-if="msg.viewType === 'image'">
                                    <img class="message-image" :src="msg.dataUrl" alt="Shared image" @click="openImagePreview(msg.dataUrl)">
                                </template>
                                <template v-else>
                                    <p class="message-text">{[ msg.text ]}</p>
                                </template>
                            </div>
                        </div>

                        <div
                            v-if="allowDelete && msg.cmd === 'chat' && msg.username === username && msg.messageId"
                            class="message-tools"
                            :class="{ 'is-received': msg.username !== username }"
                        >
                            <button class="button is-small is-light is-danger" @click="deleteMessage(msg)">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-footer px-5">
            <div class="field is-grouped">
                <div class="control is-expanded field has-addons">
                    <p class="control">
                        <button @click="triggerImageUpload" class="button is-light" :disabled="isSendingImage">
                            {[ isSendingImage ? 'Processing...' : 'Image' ]}
                        </button>
                        <input id="imageInput" class="is-hidden-input" type="file" accept="image/*" @change="handleImageSelect">
                    </p>
                    <p class="control is-expanded">
                        <textarea id="message" placeholder="Enter something..." autocomplete="off" autofocus rows="1" class="input" @keydown.enter.exact.prevent="send"></textarea>
                    </p>
                    <p class="control">
                        <button id="send" @click="send" class="button is-link">Send</button>
                    </p>
                </div>

                <p class="control">
                    <button @click="clearScreen" title="Clear" class="button is-warning is-light is-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M8 20v-5h2v5h9v-7H5v7h3zm-4-9h16V8h-6V4h-4v4H4v3zM3 21v-8H2V7a1 1 0 0 1 1-1h5V3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v3h5a1 1 0 0 1 1 1v6h-1v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"></path>
                        </svg>
                    </button>
                </p>
            </div>

            <footer class="content has-text-grey-light pb-5">
                <p>
                    Style by
                    <a href="https://ideapart.com" target="_blank">@alanoy</a>
                    <span class="px-1">|</span>
                    Server by
                    <a href="https://lion.im/" target="_blank">Han</a>
                </p>
            </footer>
        </div>

        <div v-if="previewImage" class="image-modal" @click="closeImagePreview">
            <button class="button is-dark image-modal-close" @click.stop="closeImagePreview">Close</button>
            <img :src="previewImage" alt="Preview image" @click.stop>
        </div>
    </main>

    <div class="modal" id="popup">
        <div class="modal-background"></div>
        <div class="modal-card" style="max-width: 90%">
            <header class="modal-card-head py-5">
                <p class="modal-card-title">Enter Room</p>
            </header>
            <section class="modal-card-body py-5">
                <div id="roomTips" style="overflow-wrap: anywhere;" class="notification">
                </div>
                <div class="field">
                    <div class="control">
                        <input class="input" type="text" id="username" placeholder="Enter Name...">
                    </div>
                </div>
                <div class="field">
                    <div class="control">
                        <input class="input" type="text" id="password" placeholder="Password or Empty">
                    </div>
                </div>
            </section>
            <footer class="modal-card-foot py-5">
                <div class="buttons">
                    <button id="join" class="button is-link">Enter</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let host = "{{.Url}}";
        const allowDelete = {{if .AllowDelete}}true{{else}}false{{end}};
        let ws;
        let username;
        let roomNumber;
        let password;

        const MAX_CHAT_PAYLOAD_BYTES = 4 * 1024 * 1024;

        function scrollToBottom() {
            const messageWrapper = document.getElementById('message-wrapper');
            messageWrapper.scrollTop = messageWrapper.scrollHeight;
        }

        function getQueryParams() {
            let queryParams = {};
            let queryString = window.location.search;

            if (queryString.charAt(0) === '?') {
                queryString = queryString.substr(1);
            }

            let params = new URLSearchParams(queryString);
            params.forEach((value, key) => {
                queryParams[key] = value;
            });

            return queryParams;
        }

        function formatDateTime(date) {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');

            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function generateRandomString(length) {
            let result = '';
            let characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let charactersLength = characters.length;
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;
        }

        function generateMessageId() {
            return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 10)}`;
        }

        function buildRoomTips() {
            let tips = "Room Address<br> " + window.location.href + "<br><br>Image sending strips metadata in browser before upload.";
            if (allowDelete) {
                tips += "<br><br>Delete mode is enabled.";
            }
            return tips;
        }

        function buildTextPayload(text) {
            return JSON.stringify({
                type: "text",
                message_id: generateMessageId(),
                text: text,
                sent_at: new Date().toISOString()
            });
        }

        function buildImagePayload(dataUrl) {
            return JSON.stringify({
                type: "image",
                message_id: generateMessageId(),
                data_url: dataUrl,
                sent_at: new Date().toISOString()
            });
        }

        function buildDeletePayload(messageId) {
            return JSON.stringify({
                type: "delete",
                message_id: messageId,
                sent_at: new Date().toISOString()
            });
        }

        function byteLength(text) {
            return new TextEncoder().encode(text).length;
        }

        function parseChatPayload(payload) {
            try {
                const data = JSON.parse(payload);
                if (data && data.type === "image" && typeof data.data_url === "string" && data.data_url.startsWith("data:image/")) {
                    return {
                        viewType: "image",
                        messageId: data.message_id || "",
                        text: "",
                        dataUrl: data.data_url,
                        sentAt: data.sent_at || new Date().toISOString()
                    };
                }
                if (data && data.type === "text" && typeof data.text === "string") {
                    return {
                        viewType: "text",
                        messageId: data.message_id || "",
                        text: data.text,
                        dataUrl: "",
                        sentAt: data.sent_at || new Date().toISOString()
                    };
                }
                if (data && data.type === "delete" && typeof data.message_id === "string") {
                    return {
                        viewType: "delete",
                        messageId: data.message_id,
                        text: "",
                        dataUrl: "",
                        sentAt: data.sent_at || new Date().toISOString()
                    };
                }
            } catch (error) {
            }

            return {
                viewType: "text",
                messageId: "",
                text: payload,
                dataUrl: "",
                sentAt: new Date().toISOString()
            };
        }

        function normalizeMessage(messageData) {
            const normalized = Object.assign({}, messageData, {
                viewType: "system",
                messageId: "",
                text: "",
                dataUrl: "",
                sentAt: new Date().toISOString(),
                renderKey: `${messageData.cmd}-${Math.random().toString(36).slice(2, 10)}`
            });

            if (messageData.cmd === "join" || messageData.cmd === "exit") {
                return normalized;
            }

            const parsed = parseChatPayload(messageData.payload);
            normalized.viewType = parsed.viewType;
            normalized.messageId = parsed.messageId;
            normalized.text = parsed.text;
            normalized.dataUrl = parsed.dataUrl;
            normalized.sentAt = parsed.sentAt;
            normalized.renderKey = parsed.messageId || normalized.renderKey;
            return normalized;
        }

        function ensureSocketReady() {
            if (ws === null || ws === undefined || ws === "") {
                alert("The connection is closed, please refresh the page to reconnect.");
                return false;
            }
            return true;
        }

        function sendWsPayload(payload) {
            if (!ensureSocketReady()) {
                return false;
            }
            ws.send(payload);
            return true;
        }

        function drawSanitizedImage(file, options) {
            return new Promise(function(resolve, reject) {
                const reader = new FileReader();
                reader.onload = function(loadEvent) {
                    const image = new Image();
                    image.onload = function() {
                        let width = image.naturalWidth;
                        let height = image.naturalHeight;
                        const longestSide = Math.max(width, height);
                        if (longestSide > options.maxEdge) {
                            const ratio = options.maxEdge / longestSide;
                            width = Math.max(1, Math.round(width * ratio));
                            height = Math.max(1, Math.round(height * ratio));
                        }

                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;

                        const context = canvas.getContext("2d");
                        if (!context) {
                            reject(new Error("Canvas is not supported."));
                            return;
                        }

                        context.drawImage(image, 0, 0, width, height);

                        const dataUrl = options.mimeType === "image/png"
                            ? canvas.toDataURL(options.mimeType)
                            : canvas.toDataURL(options.mimeType, options.quality);

                        resolve(dataUrl);
                    };
                    image.onerror = function() {
                        reject(new Error("Image decode failed."));
                    };
                    image.src = loadEvent.target.result;
                };
                reader.onerror = function() {
                    reject(new Error("Image read failed."));
                };
                reader.readAsDataURL(file);
            });
        }

        async function buildSanitizedImagePayload(file) {
            const variants = [
                { mimeType: file.type === "image/png" ? "image/png" : "image/jpeg", quality: 0.88, maxEdge: 1600 },
                { mimeType: "image/jpeg", quality: 0.82, maxEdge: 1600 },
                { mimeType: "image/jpeg", quality: 0.78, maxEdge: 1280 },
                { mimeType: "image/jpeg", quality: 0.72, maxEdge: 1024 }
            ];

            for (const variant of variants) {
                const dataUrl = await drawSanitizedImage(file, variant);
                const payload = buildImagePayload(dataUrl);
                if (byteLength(payload) <= MAX_CHAT_PAYLOAD_BYTES) {
                    return payload;
                }
            }

            throw new Error("Image is too large after sanitizing. Try a smaller image.");
        }

        function init(that) {
            roomNumber = getQueryParams().room;
            if (roomNumber === undefined || roomNumber === "" || roomNumber == null) {
                const currentUrl = window.location.href;
                const urlWithoutParams = currentUrl.split('?')[0];
                window.location.href = urlWithoutParams + '?room=' + generateRandomString(8).toLowerCase();
            }

            document.getElementById('roomTips').innerHTML = buildRoomTips();

            document.getElementById('join').onclick = function() {
                roomNumber = getQueryParams().room;
                username = document.getElementById('username').value;
                password = document.getElementById('password').value;

                let serverApi = window.location.protocol + '//' + host;
                if (host === "" || host === undefined || host === null) {
                    serverApi = window.location.protocol + '//' + window.location.host;
                }

                const data = { room_number: roomNumber, username: username, password: password };
                const url = serverApi + '/precheck';

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.code !== 10000) {
                            alert(data.info);
                            return;
                        }

                        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
                        if (host === "" || host === undefined || host === null) {
                            serverApi = protocol + window.location.host;
                        } else {
                            serverApi = protocol + host;
                        }
                        const path = '/ws?';
                        const param = 'username=' + encodeURIComponent(username) + '&room_number=' + encodeURIComponent(roomNumber) + '&password=' + encodeURIComponent(password) + '&cmd=join' + '&once_token=' + encodeURIComponent(data.data);

                        if (serverApi.charAt(serverApi.length - 1) === '/') {
                            serverApi = serverApi.slice(0, -1);
                        }

                        that.username = username;
                        ws = new WebSocket(serverApi + path + param);
                        that.roomTips = buildRoomTips();

                        ws.onmessage = function(event) {
                            const messageData = JSON.parse(event.data);
                            const normalized = normalizeMessage(messageData);
                            if (messageData.cmd === "join-pwd-fail") {
                                document.getElementById('popup').classList.add('is-active');
                            }

                            if (messageData.cmd === "delete" && normalized.messageId) {
                                that.items = that.items.filter(item => item.messageId !== normalized.messageId);
                            } else {
                                that.items.push(normalized);
                            }
                            that.$nextTick(function() {
                                scrollToBottom();
                            });
                        };

                        ws.onopen = function() {
                            console.log("Socket opened");
                        };

                        ws.onclose = function() {
                            console.log("Socket closed");
                            ws = null;
                        };

                        ws.onerror = function() {
                            console.log("Socket error");
                            ws = null;
                        };

                        document.getElementById('popup').classList.remove('is-active');
                    })
                    .catch(error => {
                        console.error('There has been a problem with your fetch operation:', error);
                    });
            };

            document.getElementById('popup').classList.add('is-active');
        }
    </script>

    <script type="text/javascript">
        const { createApp } = Vue;

        const app = createApp({
            delimiters: ['{[', ']}'],
            data() {
                return {
                    items: [],
                    roomTips: "",
                    username: "",
                    isSendingImage: false,
                    previewImage: "",
                    allowDelete: allowDelete,
                }
            },
            methods: {
                send() {
                    const input = document.getElementById('message');
                    const message = input.value;
                    if (message.trim() === "") {
                        return;
                    }
                    if (!sendWsPayload(buildTextPayload(message))) {
                        return;
                    }
                    input.value = "";
                },
                async handleImageSelect(event) {
                    const file = event.target.files && event.target.files[0];
                    event.target.value = "";
                    if (!file) {
                        return;
                    }
                    if (!file.type.startsWith("image/")) {
                        alert("Please choose an image file.");
                        return;
                    }

                    this.isSendingImage = true;
                    try {
                        const payload = await buildSanitizedImagePayload(file);
                        sendWsPayload(payload);
                    } catch (error) {
                        alert(error.message || "Image processing failed.");
                    } finally {
                        this.isSendingImage = false;
                    }
                },
                triggerImageUpload() {
                    if (!ensureSocketReady()) {
                        return;
                    }
                    document.getElementById('imageInput').click();
                },
                deleteMessage(msg) {
                    if (!this.allowDelete || !msg.messageId) {
                        return;
                    }
                    sendWsPayload(buildDeletePayload(msg.messageId));
                },
                clearScreen() {
                    this.items = [];
                },
                openImagePreview(dataUrl) {
                    this.previewImage = dataUrl;
                },
                closeImagePreview() {
                    this.previewImage = "";
                },
                formatDate(value) {
                    const date = value ? new Date(value) : new Date();
                    if (Number.isNaN(date.getTime())) {
                        return formatDateTime(new Date());
                    }
                    return formatDateTime(date);
                }
            },
            mounted() {
                init(this);
                window.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') {
                        this.closeImagePreview();
                    }
                });
            }
        });

        app.mount('#app');
    </script>

    <script type="text/javascript">
        const themeToggle = document.getElementById('themeToggle');

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.classList.toggle('theme-dark', savedTheme === 'theme-dark');
        }

        themeToggle.addEventListener('click', function() {
            document.documentElement.classList.toggle("theme-dark");
            localStorage.setItem('theme', document.documentElement.classList.contains('theme-dark') ? 'theme-dark' : 'theme-light');
        });
    </script>
</body>
